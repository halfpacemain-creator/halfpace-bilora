# Netlify config for HalfPace Bilora — TanStack Start + Nitro SSR.
# Nitro's `netlify` preset (pinned in vite.config.ts) outputs:
#   - Static assets  → dist/                    (publish dir)
#   - SSR function   → .netlify/functions-internal/server
#   - _redirects     → dist/_redirects          (auto-generated SSR fallback)
#   - Function manifest and headers are wired by the preset.
# Do NOT add a SPA `/* → /index.html 200` redirect — this app is SSR.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
